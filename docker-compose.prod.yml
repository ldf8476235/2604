services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: delta-trade-backend:latest
    container_name: delta-trade-backend
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: 1Panel-redis-CPU3
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      WECHAT_OPEN_REDIRECT_URI: ${APP_BASE_URL}/api/auth/wechat/callback
      WECHAT_PAY_NOTIFY_URL: ${APP_BASE_URL}/api/payments/wechat/notify
      platform.cors.allowed-origins: ${APP_BASE_URL}
    networks:
      - 1panel-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: delta-trade-frontend:latest
    container_name: delta-trade-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    networks:
      - 1panel-network

networks:
  1panel-network:
    external: true
