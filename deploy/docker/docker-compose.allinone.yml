services:
  app:
    image: crpi-e6nng8qj0ou5u67r.cn-hangzhou.personal.cr.aliyuncs.com/webfeng/webfeng:allinone-latest
    container_name: delta-trade-app
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      TZ: Asia/Shanghai
      REDIS_HOST: 1Panel-redis-CPU3
      REDIS_PORT: 6379
      WECHAT_OPEN_REDIRECT_URI: https://beifanghanzi12000.czsonghong.cn/api/auth/wechat/callback
      WECHAT_PAY_NOTIFY_URL: https://beifanghanzi12000.czsonghong.cn/api/payments/wechat/notify
      PLATFORM_CORS_ALLOWED_ORIGINS: https://beifanghanzi12000.czsonghong.cn,http://49.232.154.165:8901
    ports:
      - "8901:80"
      - "8902:8080"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - 1panel-network

  caddy:
    image: caddy:2-alpine
    container_name: delta-trade-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - 1panel-network

  mp-verify:
    image: nginx:1.27-alpine
    container_name: mp-verify-nginx
    restart: unless-stopped
    ports:
      - "7987:80"
    volumes:
      - ./MP_verify_wPUvxtdAVuNmlkQs.txt:/usr/share/nginx/html/MP_verify_wPUvxtdAVuNmlkQs.txt:ro
    networks:
      - 1panel-network

volumes:
  caddy-data:
  caddy-config:

networks:
  1panel-network:
    external: true
